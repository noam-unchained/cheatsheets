<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" role="img">
<title>Ettercap MITM attack steps</title>
<desc>Kali sitting between a client and a domain controller, followed by a seven-step flow.</desc>
<style>
  text{font-family:Arial,Helvetica,sans-serif}
  .th{font-size:14px;font-weight:500}
  .ts{font-size:12px}
  .gray .box{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.5}
  .gray .th{fill:#444441}
  .gray .ts{fill:#5F5E5A}
  .coral .box{fill:#FAECE7;stroke:#993C1D;stroke-width:.5}
  .coral .th{fill:#712B13}
  .coral .ts{fill:#993C1D}
  .blue .box{fill:#E6F1FB;stroke:#185FA5;stroke-width:.5}
  .blue .th{fill:#0C447C}
  .blue .ts{fill:#185FA5}
  .arrow{stroke:#888780;stroke-width:1.5;fill:none}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="blue"><rect class="box" x="60" y="50" width="130" height="50" rx="4"/><text class="th" x="125" y="72" text-anchor="middle">Client</text><text class="ts" x="125" y="89" text-anchor="middle">victim</text></g>
<g class="coral"><rect class="box" x="275" y="50" width="130" height="50" rx="4"/><text class="th" x="340" y="72" text-anchor="middle">Kali</text><text class="ts" x="340" y="89" text-anchor="middle">attacker (you)</text></g>
<g class="blue"><rect class="box" x="490" y="50" width="130" height="50" rx="4"/><text class="th" x="555" y="72" text-anchor="middle">DC / server</text><text class="ts" x="555" y="89" text-anchor="middle">target</text></g>
<line class="arrow" x1="192" y1="75" x2="273" y2="75" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line class="arrow" x1="407" y1="75" x2="488" y2="75" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<g class="gray"><rect class="box" x="160" y="150" width="360" height="46" rx="4"/><text class="th" x="340" y="170" text-anchor="middle">1. Prep network</text><text class="ts" x="340" y="187" text-anchor="middle">pin kali to lab subnet only</text></g>
<line class="arrow" x1="340" y1="197" x2="340" y2="212" marker-end="url(#arrow)"/>
<g class="gray"><rect class="box" x="160" y="214" width="360" height="46" rx="4"/><text class="th" x="340" y="234" text-anchor="middle">2. Launch ettercap</text><text class="ts" x="340" y="251" text-anchor="middle">sudo ettercap -G</text></g>
<line class="arrow" x1="340" y1="261" x2="340" y2="276" marker-end="url(#arrow)"/>
<g class="gray"><rect class="box" x="160" y="278" width="360" height="46" rx="4"/><text class="th" x="340" y="298" text-anchor="middle">3. Scan and set targets</text><text class="ts" x="340" y="315" text-anchor="middle">add target 1 and target 2</text></g>
<line class="arrow" x1="340" y1="325" x2="340" y2="340" marker-end="url(#arrow)"/>
<g class="coral"><rect class="box" x="160" y="342" width="360" height="46" rx="4"/><text class="th" x="340" y="362" text-anchor="middle">4. ARP poisoning</text><text class="ts" x="340" y="379" text-anchor="middle">sniff remote connections</text></g>
<line class="arrow" x1="340" y1="389" x2="340" y2="404" marker-end="url(#arrow)"/>
<g class="gray"><rect class="box" x="160" y="406" width="360" height="46" rx="4"/><text class="th" x="340" y="426" text-anchor="middle">5. Verify</text><text class="ts" x="340" y="443" text-anchor="middle">arp -a shows kali's mac</text></g>
<line class="arrow" x1="340" y1="453" x2="340" y2="468" marker-end="url(#arrow)"/>
<g class="gray"><rect class="box" x="160" y="470" width="360" height="46" rx="4"/><text class="th" x="340" y="490" text-anchor="middle">6. Stop attack</text><text class="ts" x="340" y="507" text-anchor="middle">restores arp tables</text></g>
<line class="arrow" x1="340" y1="517" x2="340" y2="532" marker-end="url(#arrow)"/>
<g class="gray"><rect class="box" x="160" y="534" width="360" height="46" rx="4"/><text class="th" x="340" y="554" text-anchor="middle">7. Restore network</text><text class="ts" x="340" y="571" text-anchor="middle">switch back to dhcp</text></g>
</svg>
